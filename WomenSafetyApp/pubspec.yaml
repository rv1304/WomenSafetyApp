name: my_app
description: Nirbhaya – Women's Safety App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking & HTTP
  http: ^1.2.1

  # Location & GPS
  location: ^6.0.0
  geolocator: ^11.0.0

  # Map & Navigation
  webview_flutter: ^4.4.2
  url_launcher: ^6.1.10
  latlong2: ^0.9.0

  # Contacts & Storage
  shared_preferences: ^2.2.3
  contacts_service: ^0.6.3

  # Permissions
  permission_handler: ^11.0.1

  # Voice Detection
  speech_to_text: ^6.6.0

  # App Lock (Biometric/PIN)
  local_auth: ^2.1.8

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Battery & Connectivity
  battery_plus: ^5.0.3
  connectivity_plus: ^5.0.2

  # Environment
  flutter_dotenv: ^5.1.0

  # UI Icons
  ionicons: ^0.2.2
  flutter_map: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env